<!doctype html>
<html lang="tg">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Book Parser — Намоиш</title>
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/static/styles.css?v=20260415-3" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar__inner">
        <div class="brand">
          <div class="brand__mark" aria-hidden="true">BP</div>
          <div class="brand__text">
            <div class="brand__title">Book Parser</div>
            <div class="brand__subtitle">Интерфейси намоиш (бе илова)</div>
          </div>
        </div>
        <nav class="topbar__nav">
          <span class="badge" id="userBadge" style="display: none"></span>
          <a class="link" href="/">Ҷустуҷӯ</a>
          <a class="link" id="adminLink" href="/admin" style="display: none">Мудирият</a>
          <a class="link" id="moderatorLink" href="/" style="display: none">Интерфейси модератор</a>
          <button class="btn" id="logoutBtn" type="button" style="display: none">Баромадан</button>
        </nav>
      </div>
    </header>

    <main class="layout">
      <aside class="panel">
        <div class="panel__header">
          <h2 class="panel__title">Файлҳо</h2>
          <div class="panel__hint" id="docsMeta">—</div>
        </div>

        <div class="stack">
          <label class="field">
            <span class="field__label">Ҷустуҷӯ аз рӯи ном</span>
            <input id="docFilter" class="input" placeholder="масалан: китоб.docx" autocomplete="off" />
          </label>

          <div id="docsList" class="list" aria-label="Список файлов"></div>
        </div>
      </aside>

      <section class="panel">
        <div class="panel__header">
          <h2 class="panel__title">
            Файл
            <span id="docTitle" class="panel__hint">—</span>
          </h2>
          <div class="panel__hint">Танҳо намоиш ва зеркашӣ</div>
        </div>

        <div id="docStats" class="stats"></div>
        <div class="tabs" role="tablist" aria-label="Данные файла">
          <button class="tab is-active" type="button" data-tab="text">Текст</button>
          <button class="tab" type="button" data-tab="paragraphs">Абзацы</button>
          <button class="tab" type="button" data-tab="sentences">Предложения</button>
          <button class="tab" type="button" data-tab="words">Слова</button>
        </div>
        <div id="docBody" class="doc" aria-label="Содержимое файла">
          <div class="placeholder">Файлро аз рӯйхати чап интихоб кунед.</div>
        </div>
        <div class="row row--end">
          <button id="downloadBtn" class="btn" type="button" disabled>Зеркашӣ</button>
        </div>
      </section>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script src="/static/auth.js?v=20260415-3"></script>
    <script src="/static/viewer.js?v=20260415-3"></script>
  </body>
</html>
