<!doctype html>
<html lang="tg">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Book Parser — Воридшавӣ</title>
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/static/styles.css?v=20260415-3" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar__inner">
        <div class="brand">
          <div class="brand__mark" aria-hidden="true">BP</div>
          <div class="brand__text">
            <div class="brand__title">Book Parser</div>
            <div class="brand__subtitle">Воридшавӣ</div>
          </div>
        </div>
        <nav class="topbar__nav">
          <a class="link" href="/register">Бақайдгирӣ</a>
        </nav>
      </div>
    </header>

    <main class="layout layout--center">
      <section class="panel auth">
        <div class="panel__header">
          <h2 class="panel__title">Воридшавӣ</h2>
          <div class="panel__hint">Почтаи электронӣ ва паролро ворид кунед</div>
        </div>

        <form id="loginForm" class="stack">
          <label class="field">
            <span class="field__label">Почтаи электронӣ</span>
            <input id="email" class="input" type="email" autocomplete="email" required maxlength="255" />
          </label>
          <label class="field">
            <span class="field__label">Парол</span>
            <input id="password" class="input" type="password" autocomplete="current-password" required minlength="6" />
          </label>
          <button id="loginBtn" class="btn btn--primary" type="submit">Даромадан</button>
          <div class="muted">
            Ҳисоб надоред?
            <a class="link link--inline" href="/register">Бақайдгирӣ</a>
          </div>
        </form>
      </section>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script src="/static/auth.js?v=20260415-3"></script>
    <script src="/static/login.js?v=20260415-3"></script>
  </body>
</html>
