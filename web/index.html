<!doctype html>
<html lang="tg">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Book Parser — Веб</title>
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/static/styles.css?v=20260409" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar__inner">
        <div class="brand">
          <div class="brand__mark" aria-hidden="true">BP</div>
          <div class="brand__text">
            <div class="brand__title">Book Parser</div>
            <div class="brand__subtitle">Боргузорӣ, таҳлил ва ҷустуҷӯ дар файлҳо</div>
          </div>
        </div>
      </div>
    </header>

    <main class="layout">
      <aside class="panel">
        <div class="panel__header">
          <h2 class="panel__title">Файлҳо</h2>
          <div class="panel__hint" id="docsMeta">—</div>
        </div>

        <div class="stack">
          <label class="field">
            <span class="field__label">Ҷустуҷӯ аз рӯи ном</span>
            <input id="docFilter" class="input" placeholder="Масалан: китоб.docx" autocomplete="off" />
          </label>

          <form id="uploadForm" class="card">
            <div class="card__title">Илова кардани файл</div>
            <div class="card__body">
              <input id="uploadFile" class="file" type="file" accept=".pdf,.docx" />
              <button id="uploadBtn" class="btn btn--primary" type="submit">Боргузорӣ</button>
              <div class="muted">PDF ва DOCX дастгирӣ мешаванд</div>
            </div>
          </form>

          <div id="docsList" class="list" aria-label="Рӯйхати файлҳо"></div>
        </div>
      </aside>

      <section class="panel">
        <div class="panel__header">
          <h2 class="panel__title">Ҷустуҷӯ</h2>
          <div class="panel__hint">Дар ҳамаи файлҳо ё дар файли интихобшуда</div>
        </div>

        <div class="tabs tabs--views" role="tablist" aria-label="Асбобҳо">
          <button class="tab is-active" type="button" data-view="search">Ҷустуҷӯ</button>
          <button class="tab" type="button" data-view="concordance">Concordance</button>
          <button class="tab" type="button" data-view="wordlist">Wordlist</button>
          <button class="tab" type="button" data-view="ngrams">N-grams</button>
        </div>

        <div id="viewSearch" class="toolview is-active">
          <form id="searchForm" class="search">
            <label class="field search__query">
              <span class="field__label">Дархост</span>
              <input
                id="searchQuery"
                class="input"
                placeholder="Калимаро ё ибораро ворид кунед…"
                autocomplete="off"
                required
                minlength="1"
              />
            </label>

            <label class="field">
              <span class="field__label">Намуд</span>
              <select id="searchTarget" class="select">
                <option value="phrase" selected>Ибора (ҷумла + банд)</option>
                <option value="word">Калима</option>
                <option value="sentence">Ҷумла</option>
                <option value="paragraph">Банд</option>
              </select>
            </label>

            <label class="field">
              <span class="field__label">Файл</span>
              <select id="searchDocument" class="select">
                <option value="" selected>Ҳамаи файлҳо</option>
              </select>
            </label>

            <label class="field" id="wordModeWrap">
              <span class="field__label">Режим (барои «Калима»)</span>
              <select id="searchWordMode" class="select">
                <option value="partial" selected>Қисман</option>
                <option value="exact">Дақиқ</option>
              </select>
            </label>

            <button id="searchBtn" class="btn btn--primary" type="submit">Ҷустуҷӯ</button>
          </form>
        </div>

        <div id="viewConcordance" class="toolview">
          <form id="concordanceForm" class="toolform">
            <label class="field toolform__wide">
              <span class="field__label">Дархост</span>
              <input id="concordanceQuery" class="input" placeholder="Калима…" autocomplete="off" required />
            </label>
            <label class="field">
              <span class="field__label">Режим</span>
              <select id="concordanceMode" class="select">
                <option value="partial" selected>Қисман</option>
                <option value="exact">Дақиқ</option>
              </select>
            </label>
            <label class="field">
              <span class="field__label">Файл</span>
              <select id="concordanceDocument" class="select">
                <option value="" selected>Ҳамаи файлҳо</option>
              </select>
            </label>
            <button id="concordanceBtn" class="btn btn--primary" type="submit">Намоиш</button>
          </form>
        </div>

        <div id="viewWordlist" class="toolview">
          <form id="wordlistForm" class="toolform">
            <label class="field toolform__wide">
              <span class="field__label">Филтр (ихтиёрӣ)</span>
              <input id="wordlistFilter" class="input" placeholder="масалан: китоб" autocomplete="off" />
            </label>
            <label class="field">
              <span class="field__label">Файл</span>
              <select id="wordlistDocument" class="select">
                <option value="" selected>Ҳамаи файлҳо</option>
              </select>
            </label>
            <label class="field">
              <span class="field__label">Min freq</span>
              <input id="wordlistMinFreq" class="input" type="number" min="1" value="2" />
            </label>
            <button id="wordlistBtn" class="btn btn--primary" type="submit">Сохтан</button>
          </form>
        </div>

        <div id="viewNgrams" class="toolview">
          <form id="ngramsForm" class="toolform">
            <label class="field">
              <span class="field__label">N</span>
              <select id="ngramsN" class="select">
                <option value="2" selected>2</option>
                <option value="3">3</option>
                <option value="4">4</option>
              </select>
            </label>
            <label class="field">
              <span class="field__label">Файл</span>
              <select id="ngramsDocument" class="select">
                <option value="" selected>Ҳамаи файлҳо</option>
              </select>
            </label>
            <label class="field">
              <span class="field__label">Min freq</span>
              <input id="ngramsMinFreq" class="input" type="number" min="1" value="2" />
            </label>
            <button id="ngramsBtn" class="btn btn--primary" type="submit">Сохтан</button>
          </form>
        </div>

        <div class="split">
          <section class="card">
            <div class="card__title">Натиҷаҳо</div>
            <div class="card__body">
              <div id="resultsMeta" class="muted">—</div>
              <div id="resultsList" class="results" aria-label="Натиҷаҳои ҷустуҷӯ"></div>
            </div>
          </section>

          <section class="card">
            <div class="card__title">
              Файл
              <span id="docTitle" class="card__title-muted">—</span>
            </div>
            <div class="card__body">
              <div id="docStats" class="stats"></div>
              <div class="tabs" role="tablist" aria-label="Маълумоти файл">
                <button class="tab is-active" type="button" data-tab="text">Матн</button>
                <button class="tab" type="button" data-tab="paragraphs">Бандҳо</button>
                <button class="tab" type="button" data-tab="sentences">Ҷумлаҳо</button>
                <button class="tab" type="button" data-tab="words">Калимаҳо</button>
              </div>
              <div id="docBody" class="doc" aria-label="Мундариҷаи файл">
                <div class="placeholder">Файлро аз рӯйхати чап интихоб кунед.</div>
              </div>
              <div class="row row--end">
                <button id="downloadBtn" class="btn" type="button" disabled>Зеркашӣ</button>
                <button id="deleteBtn" class="btn btn--danger" type="button" disabled>Нест кардан</button>
              </div>
            </div>
          </section>
        </div>
      </section>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script src="/static/app.js?v=20260409"></script>
  </body>
</html>
