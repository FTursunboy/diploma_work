version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: book-parser-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./web:/app/web
      - ./main.py:/app/main.py
      - ./search.py:/app/search.py
      - ./parser.py:/app/parser.py
      - ./splitter.py:/app/splitter.py
      - ./database.py:/app/database.py
      - ./storage:/app/storage
    depends_on:
      - db
    environment:
      - DATABASE_URL=mysql+pymysql://bookuser:bookpass@db:3306/books

  db:
    image: mysql:8.1
    container_name: book-parser-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: books
      MYSQL_USER: bookuser
      MYSQL_PASSWORD: bookpass
      MYSQL_ROOT_PASSWORD: rootpass
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - ./storage/mysql/data:/var/lib/mysql
    ports:
      - "3307:3306"
