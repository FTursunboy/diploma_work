version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: book-parser-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./web:/app/web
      - ./main.py:/app/main.py
      - ./search.py:/app/search.py
      - ./parser.py:/app/parser.py
      - ./splitter.py:/app/splitter.py
      - ./database.py:/app/database.py
      - ./auth.py:/app/auth.py
      - ./routers:/app/routers
      - ./services:/app/services
      - ./storage:/app/storage
    depends_on:
      - db
    environment:
      - DATABASE_URL=mysql+pymysql://bookuser:bookpass@db:3306/books
      - AUTH_SECRET=change-me-in-prod
      - ADMIN_EMAIL=admin@local
      - ADMIN_PASSWORD=admin12345
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_EMBEDDING_MODEL=${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      - OPENAI_SUMMARY_MODEL=${OPENAI_SUMMARY_MODEL:-gpt-5-nano}

  db:
    image: mysql:8.1
    container_name: book-parser-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: books
      MYSQL_USER: bookuser
      MYSQL_PASSWORD: bookpass
      MYSQL_ROOT_PASSWORD: rootpass
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - ./storage/mysql/data:/var/lib/mysql
    ports:
      - "3307:3306"
