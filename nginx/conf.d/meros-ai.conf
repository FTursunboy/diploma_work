server {
    listen 80;
    listen [::]:80;
    server_name meros-ai.tj www.meros-ai.tj;

    return 301 https://meros-ai.tj$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.meros-ai.tj;

    ssl_certificate /etc/nginx/certs/meros-ai.tj.pem;
    ssl_certificate_key /etc/nginx/certs/meros-ai.tj.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    return 301 https://meros-ai.tj$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name meros-ai.tj;

    ssl_certificate /etc/nginx/certs/meros-ai.tj.pem;
    ssl_certificate_key /etc/nginx/certs/meros-ai.tj.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 200m;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    location / {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
