services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: book-parser-api
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - "8000"
    volumes:
      - ./web:/app/web
      - ./main.py:/app/main.py
      - ./search.py:/app/search.py
      - ./parser.py:/app/parser.py
      - ./splitter.py:/app/splitter.py
      - ./config.py:/app/config.py
      - ./database.py:/app/database.py
      - ./auth.py:/app/auth.py
      - ./routers:/app/routers
      - ./services:/app/services
      - ./storage:/app/storage
    depends_on:
      - db
    environment:
      - DATABASE_URL=mysql+pymysql://bookuser:bookpass@db:3306/books
      - AUTH_SECRET=change-me-in-prod
      - ADMIN_EMAIL=admin@local
      - ADMIN_PASSWORD=admin12345

  nginx:
    image: nginx:1.27-alpine
    container_name: book-parser-nginx
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./storage/nginx/certs:/etc/nginx/certs:ro

  db:
    image: mysql:8.1
    container_name: book-parser-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: books
      MYSQL_USER: bookuser
      MYSQL_PASSWORD: bookpass
      MYSQL_ROOT_PASSWORD: rootpass
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - ./storage/mysql/data:/var/lib/mysql
    ports:
      - "127.0.0.1:3307:3306"
